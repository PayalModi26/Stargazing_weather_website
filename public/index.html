<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarGaze — Stargazing Weather Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#0a0a0b;--bg3:#111113;--surface:#18181b;
  --border:rgba(255,255,255,.06);--border-hover:rgba(255,255,255,.1);
  --accent:#6d8cff;--accent2:#a78bfa;--accent-dim:rgba(109,140,255,.12);
  --text:#eee;--text2:#aaa;--text3:#666;
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;
  --radius:12px;--font:'Inter',system-ui,-apple-system,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f7f7f8;--bg2:#fff;--bg3:#f0f0f2;--surface:#e8e8ec;
  --border:rgba(0,0,0,.07);--border-hover:rgba(0,0,0,.12);
  --accent:#4f63e7;--accent2:#7c3aed;--accent-dim:rgba(79,99,231,.08);
  --text:#111;--text2:#666;--text3:#999;
  --green:#059669;--yellow:#d97706;--red:#dc2626;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;transition:background .3s var(--ease),color .3s var(--ease);overflow-x:hidden}

.stars{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 8% 15%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 25% 45%,rgba(255,255,255,.4),transparent),
    radial-gradient(1.2px 1.2px at 47% 12%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 62% 68%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 78% 22%,rgba(255,255,255,.25),transparent),
    radial-gradient(1.2px 1.2px at 90% 80%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 15% 75%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 55% 90%,rgba(255,255,255,.2),transparent),
    radial-gradient(1.5px 1.5px at 35% 30%,rgba(255,255,255,.55),transparent),
    radial-gradient(1px 1px at 82% 50%,rgba(255,255,255,.2),transparent);
  animation:twinkle 6s ease-in-out infinite alternate}
[data-theme="light"] .stars{display:none}
@keyframes twinkle{0%{opacity:.5}100%{opacity:1}}

.page{position:relative;z-index:1}

/* Nav */
nav{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.25rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg2);transition:background .3s var(--ease),border-color .3s var(--ease)}
@supports(backdrop-filter:blur(1px)){
  [data-theme="dark"] nav{background:rgba(0,0,0,.75);backdrop-filter:blur(24px) saturate(1.3)}
  [data-theme="light"] nav{background:rgba(255,255,255,.8);backdrop-filter:blur(24px) saturate(1.3)}
}
.nav-l{display:flex;align-items:center;gap:.4rem;font-weight:700;font-size:1rem;letter-spacing:-.02em}
.nav-l svg{width:20px;height:20px;opacity:.7}
.nav-r{display:flex;gap:.4rem;align-items:center}

/* Buttons */
.btn{padding:.35rem .7rem;border-radius:7px;border:none;cursor:pointer;font:.5rem/1 var(--font);font-size:.75rem;font-weight:500;transition:all .2s var(--ease)}
.btn-o{background:transparent;color:var(--text3);border:1px solid var(--border)}
.btn-o:hover{color:var(--text);border-color:var(--accent)}
.btn-f{background:var(--accent);color:#fff;border:1px solid transparent}
.btn-f:hover{filter:brightness(1.12)}
.btn-i{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:.9rem;transition:all .2s var(--ease);flex-shrink:0}
.btn-i:hover{border-color:var(--accent);color:var(--text)}
.uname{color:var(--accent);font-size:.75rem;font-weight:500}

/* Hero */
.hero{text-align:center;padding:3.5rem 1.25rem 2rem;max-width:580px;margin:0 auto}
.hero h1{font-size:clamp(1.8rem,4.5vw,2.6rem);font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:.6rem}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text3);font-size:.9rem;margin-bottom:1.75rem;font-weight:400}

.search{display:flex;max-width:440px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:3px;transition:border-color .2s var(--ease)}
.search:focus-within{border-color:var(--accent)}
.search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:.85rem;padding:0 .7rem;font-family:var(--font)}
.search input::placeholder{color:var(--text3)}
.search button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.55rem 1.1rem;font-weight:600;cursor:pointer;font-size:.8rem;font-family:var(--font);transition:filter .2s;white-space:nowrap}
.search button:hover{filter:brightness(1.12)}

.chips{margin-top:.8rem;display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:.25rem .6rem;font-size:.7rem;color:var(--text3);cursor:pointer;transition:all .2s var(--ease);font-family:var(--font)}
.chip:hover{border-color:var(--accent);color:var(--accent)}

/* Loader */
.loader{text-align:center;padding:2.5rem}
.loader .sp{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto .6rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{color:var(--text3);font-size:.8rem}

/* Dashboard */
.dash{padding:0 1rem 2rem;max-width:1080px;margin:0 auto;animation:up .45s var(--ease)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.dash-head{display:flex;align-items:center;justify-content:space-between;padding:.85rem 0;flex-wrap:wrap;gap:.5rem}
.dash-head h2{font-size:1.2rem;font-weight:700;letter-spacing:-.02em}
.dash-head small{color:var(--text3);font-size:.7rem;display:block;margin-top:.1rem}

/* Grid */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-bottom:.65rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.65rem}
@media(max-width:900px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g3,.g2{grid-template-columns:1fr}}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;transition:border-color .2s var(--ease),background .3s var(--ease)}
.card:hover{border-color:var(--border-hover)}
.card-t{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:.65rem;font-weight:600}

/* Score */
.sc-card{text-align:center}
[data-theme="dark"] .sc-card{background:linear-gradient(180deg,#08081a 0%,#000 100%);border-color:rgba(109,140,255,.1)}
.sc-label{font-size:.85rem;font-weight:600;margin-top:.15rem}
.sc-sub{font-size:.7rem;color:var(--text3)}

/* Weather */
.w-temp{font-size:2.2rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.w-temp span{font-size:.85rem;font-weight:400;color:var(--text3)}
.w-desc{color:var(--text3);font-size:.75rem;margin:.15rem 0 .6rem}
.w-grid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.w-stat{background:var(--bg3);border-radius:7px;padding:.4rem .5rem;transition:background .3s var(--ease)}
.w-stat .l{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.w-stat .v{font-size:.8rem;font-weight:600;margin-top:.05rem}

/* AQI */
.aqi-n{font-size:2rem;font-weight:800;letter-spacing:-.02em}
.aqi-b{display:inline-block;padding:.15rem .5rem;border-radius:5px;font-size:.65rem;font-weight:600;color:#000;margin:.2rem 0 .35rem}
.aqi-a{font-size:.7rem;color:var(--text3);line-height:1.45}
.poll{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.3rem;margin-top:.5rem}
.poll-i{background:var(--bg3);border-radius:7px;padding:.35rem;text-align:center;transition:background .3s var(--ease)}
.poll-i .l{font-size:.5rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.poll-i .v{font-size:.75rem;font-weight:600}

/* Astro */
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.a-item{background:var(--bg3);border-radius:7px;padding:.5rem;transition:background .3s var(--ease)}
.a-item .l{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.a-item .v{font-size:.8rem;font-weight:600;margin-top:.1rem}
.a-item .d{font-size:.6rem;color:var(--text3);margin-top:.05rem}
.tt{font-size:.55rem;cursor:help;color:var(--accent);opacity:.6;margin-left:.15rem}

/* Moon */
.moon-ico{font-size:2.5rem;margin-bottom:.15rem}
.moon-name{font-size:.85rem;font-weight:600}
.moon-ill{color:var(--text3);font-size:.7rem;margin-bottom:.5rem}
.moon-g{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.moon-t{background:var(--bg3);border-radius:7px;padding:.35rem;text-align:center;transition:background .3s var(--ease)}
.moon-t .l{font-size:.5rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.moon-t .v{font-size:.75rem;font-weight:600;margin-top:.05rem}

/* Viewing */
.vw-time{font-size:1.15rem;font-weight:700;color:var(--accent);margin:.15rem 0 .3rem;letter-spacing:-.01em}
.vw-note{font-size:.7rem;color:var(--text3);margin-bottom:.4rem}
.vw-list{list-style:none;display:flex;flex-direction:column;gap:.25rem}
.vw-list li{display:flex;align-items:center;gap:.35rem;font-size:.72rem}
.vw-list li::before{content:"";width:3px;height:3px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* Forecast */
.fc-row{display:flex;gap:.35rem;overflow-x:auto;padding-bottom:.2rem}
.fc-row::-webkit-scrollbar{height:0}
.fc-d{flex:1;min-width:75px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.5rem .35rem;text-align:center;transition:all .2s var(--ease)}
.fc-d:hover{border-color:var(--border-hover)}
.fc-d .dt{font-size:.6rem;color:var(--text3);margin-bottom:.15rem;font-weight:500}
.fc-d .ic{font-size:1.2rem;margin:.1rem 0}
.fc-d .tm{font-size:.7rem}
.fc-d .hi{font-weight:700}
.fc-d .lo{color:var(--text3)}
.fc-d .cl{font-size:.6rem;color:var(--text3);margin-top:.15rem}

.chart-area{margin-top:.7rem}

/* Error */
.err-msg{text-align:center;padding:1rem;color:var(--red);background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.12);border-radius:var(--radius);margin:.5rem 1rem;font-size:.8rem;max-width:1080px;margin-left:auto;margin-right:auto}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
@supports(backdrop-filter:blur(1px)){.modal-bg{backdrop-filter:blur(6px)}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:360px;margin:1rem;transition:background .3s var(--ease)}
.m-tabs{display:flex;gap:.3rem;margin-bottom:1rem}
.m-tab{flex:1;padding:.4rem;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:.75rem;font-family:var(--font);font-weight:500;transition:all .2s var(--ease)}
.m-tab.on{background:var(--accent);color:#fff;border-color:transparent;font-weight:600}
.fg{margin-bottom:.7rem}
.fg label{display:block;font-size:.6rem;color:var(--text3);margin-bottom:.25rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.fg input{width:100%;padding:.5rem .65rem;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.8rem;outline:none;font-family:var(--font);transition:border-color .2s var(--ease)}
.fg input:focus{border-color:var(--accent)}
.m-act{display:flex;gap:.3rem;margin-top:.85rem}
.m-msg{font-size:.7rem;margin-top:.35rem;min-height:.9em}
.m-msg.ok{color:var(--green)}.m-msg.er{color:var(--red)}

/* Fav Panel */
.fav-p{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin:.5rem 1rem;padding:.7rem .85rem;max-width:1080px;margin-left:auto;margin-right:auto;transition:background .3s var(--ease)}
.fav-p h4{font-size:.6rem;color:var(--text3);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.fav-list{display:flex;flex-wrap:wrap;gap:.3rem}
.fav-c{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:.2rem .5rem;font-size:.7rem;display:flex;align-items:center;gap:.25rem;transition:background .3s var(--ease)}
.fav-c span{cursor:pointer;color:var(--accent);font-weight:500}
.fav-c button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.65rem;padding:0}
.fav-c button:hover{color:var(--red)}

/* Span2 */
.span2{grid-column:span 2}
@media(max-width:600px){.span2{grid-column:span 1}}

/* Footer */
footer{text-align:center;padding:1.5rem 1rem;color:var(--text3);font-size:.6rem;border-top:1px solid var(--border);max-width:1080px;margin:1.5rem auto 0;letter-spacing:.01em}

/* Recharts overrides */
.recharts-text{fill:var(--text3)!important;font-family:var(--font)!important;font-size:10px!important}
.recharts-cartesian-grid line{stroke:var(--border)!important}
.recharts-tooltip-wrapper .recharts-default-tooltip{background:var(--bg2)!important;border:1px solid var(--border)!important;border-radius:8px!important;font-size:12px!important;font-family:var(--font)!important;color:var(--text)!important;box-shadow:0 4px 20px rgba(0,0,0,.3)!important}
.recharts-tooltip-item{color:var(--text2)!important}
</style>
</head>
<body>
<div class="stars"></div>
<div class="page" id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const {
  ResponsiveContainer, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip,
  RadialBarChart, RadialBar, BarChart, Bar, Cell, Legend
} = Recharts;

const THEME_KEY = "sg-theme";

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem(THEME_KEY) || "dark");
  const [city, setCity] = useState("");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [user, setUser] = useState(null);
  const [modal, setModal] = useState(false);
  const [favs, setFavs] = useState([]);
  const [showFavs, setShowFavs] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem(THEME_KEY, theme);
  }, [theme]);

  const doSearch = useCallback(async (c) => {
    if (!c.trim()) return;
    setLoading(true); setError(""); setData(null);
    try {
      const res = await fetch(`/api/dashboard?city=${encodeURIComponent(c.trim())}`);
      const json = await res.json();
      if (!res.ok) { setError(json.error || "Something went wrong"); setLoading(false); return; }
      setData(json); setCity(c.trim());
    } catch { setError("Network error — check your connection."); }
    setLoading(false);
  }, []);

  const loadFavs = useCallback(async () => {
    if (!user) return;
    try { const r = await fetch("/api/favorites"); setFavs(await r.json()); } catch {}
  }, [user]);

  useEffect(() => { if (user) loadFavs(); }, [user, loadFavs]);

  return (
    <>
      <Navbar theme={theme} setTheme={setTheme} user={user} setUser={setUser}
        setModal={setModal} showFavs={showFavs} setShowFavs={setShowFavs} loadFavs={loadFavs} />
      <Hero onSearch={doSearch} />
      {error && <div className="err-msg">{error}</div>}
      {loading && <div className="loader"><div className="sp"/><p>Analyzing sky conditions...</p></div>}
      {showFavs && user && <FavPanel favs={favs} onSearch={doSearch} onRemove={async (c)=>{
        await fetch("/api/favorites",{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({city:c})});
        loadFavs();
      }}/>}
      {data && <Dashboard data={data} city={city} user={user} theme={theme} onAddFav={async()=>{
        if(!user)return;
        await fetch("/api/favorites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({city})});
        loadFavs();
      }}/>}
      <footer>StarGaze &mdash; Powered by OpenWeatherMap, 7Timer! & WeatherAPI</footer>
      {modal && <AuthModal onClose={()=>setModal(false)} onLogin={setUser}/>}
    </>
  );
}

/* ── Navbar ── */
function Navbar({ theme, setTheme, user, setUser, setModal, showFavs, setShowFavs, loadFavs }) {
  return (
    <nav>
      <div className="nav-l">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="m4.93 4.93 4.24 4.24M14.83 9.17l4.24-4.24M14.83 14.83l4.24 4.24M9.17 14.83l-4.24 4.24"/></svg>
        StarGaze
      </div>
      <div className="nav-r">
        {user && <span className="uname">Hi, {user}</span>}
        {user && <button className="btn btn-o" onClick={()=>{setShowFavs(!showFavs);if(!showFavs)loadFavs();}}>Favorites</button>}
        {!user && <button className="btn btn-o" onClick={()=>setModal(true)}>Sign In</button>}
        {user && <button className="btn btn-o" onClick={async()=>{await fetch("/api/logout",{method:"POST"});setUser(null);setShowFavs(false);}}>Sign Out</button>}
        <button className="btn-i" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} title="Toggle theme">
          {theme==="dark"?"☀":"☾"}
        </button>
      </div>
    </nav>
  );
}

/* ── Hero ── */
function Hero({ onSearch }) {
  const [val, setVal] = useState("");
  const cities = ["Pune","Mumbai","Delhi","Bangalore","Chennai","Kolkata","Jaipur"];
  return (
    <section className="hero">
      <h1>Is Tonight Good for <em>Stargazing?</em></h1>
      <p>Real-time weather, air quality & astronomy — one clear answer.</p>
      <div className="search">
        <input value={val} onChange={e=>setVal(e.target.value)} placeholder="Enter a city..."
          onKeyDown={e=>{if(e.key==="Enter"){onSearch(val)}}} />
        <button onClick={()=>onSearch(val)}>Search</button>
      </div>
      <div className="chips">
        {cities.map(c=><span key={c} className="chip" onClick={()=>{setVal(c);onSearch(c)}}>{c}</span>)}
      </div>
    </section>
  );
}

/* ── Favorites Panel ── */
function FavPanel({ favs, onSearch, onRemove }) {
  return (
    <div className="fav-p">
      <h4>Saved Cities</h4>
      <div className="fav-list">
        {favs.length ? favs.map(f=>(
          <div key={f.city_name} className="fav-c">
            <span onClick={()=>onSearch(f.city_name)}>{f.city_name}</span>
            <button onClick={()=>onRemove(f.city_name)}>&times;</button>
          </div>
        )) : <span style={{color:"var(--text3)",fontSize:".7rem"}}>No favorites yet.</span>}
      </div>
    </div>
  );
}

/* ── Dashboard ── */
function Dashboard({ data, city, user, theme, onAddFav }) {
  const { weather, astronomy, moon, stargazing } = data;
  return (
    <div className="dash">
      <div className="dash-head">
        <div>
          <h2>{weather.city}, {weather.country}</h2>
          <small>Updated {new Date().toLocaleTimeString()}</small>
        </div>
        {user && <button className="btn btn-o" onClick={onAddFav}>Save to Favorites</button>}
      </div>

      <div className="g3">
        <ScoreCard score={stargazing.score} label={stargazing.label} city={weather.city} breakdown={stargazing.score_breakdown} theme={theme}/>
        <WeatherCard w={weather}/>
        <AQICard w={weather}/>
      </div>
      <div className="g2">
        <AstroCard a={astronomy}/>
        <MoonCard m={moon}/>
      </div>
      <div className="g3">
        <ViewingCard s={stargazing}/>
        <ForecastCard forecast={weather.forecast} theme={theme}/>
      </div>
    </div>
  );
}

/* ── Score Card (Radial Bar) ── */
function ScoreCard({ score, label, city, breakdown, theme }) {
  const color = score >= 70 ? "var(--green)" : score >= 50 ? "var(--yellow)" : "var(--red)";
  const radialData = [{ value: score, fill: color }];
  const bd = breakdown;
  const factors = [
    { name:"Clouds", val: Math.max(0,100 - bd.cloud_cover.value) },
    { name:"AQI", val: Math.max(0,100 - bd.aqi.value/5) },
    { name:"Transp.", val: ((bd.transparency.value-1)/7)*100 },
    { name:"Moon", val: Math.max(0,100 - bd.moon_phase.value) },
  ];

  return (
    <div className="card sc-card">
      <div className="card-t">Stargazing Score</div>
      <div style={{width:130,height:130,margin:"0 auto .4rem",position:"relative"}}>
        <ResponsiveContainer>
          <RadialBarChart innerRadius="72%" outerRadius="100%" data={radialData} startAngle={90} endAngle={-270} barSize={8}>
            <RadialBar background={{fill: theme==="dark"?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"}} dataKey="value" cornerRadius={8} max={100}/>
          </RadialBarChart>
        </ResponsiveContainer>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
          <span style={{fontSize:"1.6rem",fontWeight:800,letterSpacing:"-.03em"}}>{score}%</span>
        </div>
      </div>
      <div className="sc-label">{label}</div>
      <div className="sc-sub">{city} tonight</div>
      <div style={{marginTop:".6rem",height:80}}>
        <ResponsiveContainer>
          <BarChart data={factors} layout="vertical" margin={{top:0,right:4,bottom:0,left:0}} barSize={5}>
            <XAxis type="number" domain={[0,100]} hide/>
            <YAxis type="category" dataKey="name" width={48} tick={{fontSize:9,fill:"var(--text3)"}}/>
            <Bar dataKey="val" radius={[0,3,3,0]}>
              {factors.map((f,i)=><Cell key={i} fill={f.val>=70?"var(--green)":f.val>=50?"var(--yellow)":"var(--red)"}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

/* ── Weather Card ── */
function WeatherCard({ w }) {
  return (
    <div className="card">
      <div className="card-t">Weather</div>
      <div className="w-temp">{w.temp}<span>&deg;C</span></div>
      <div className="w-desc">{w.description}</div>
      <div className="w-grid">
        <div className="w-stat"><div className="l">Feels Like</div><div className="v">{w.feels_like}&deg;C</div></div>
        <div className="w-stat"><div className="l">Humidity</div><div className="v">{w.humidity}%</div></div>
        <div className="w-stat"><div className="l">Wind</div><div className="v">{w.wind_speed} km/h</div></div>
        <div className="w-stat"><div className="l">Clouds</div><div className="v">{w.cloud_cover}%</div></div>
      </div>
    </div>
  );
}

/* ── AQI Card ── */
function AQICard({ w }) {
  return (
    <div className="card">
      <div className="card-t">Air Quality</div>
      <div className="aqi-n" style={{color:w.aqi_level.color}}>{w.aqi}</div>
      <div><span className="aqi-b" style={{background:w.aqi_level.color}}>{w.aqi_level.label}</span></div>
      <div className="aqi-a">{w.aqi_level.advice}</div>
      <div className="poll">
        <div className="poll-i"><div className="l">PM2.5</div><div className="v">{w.pm25}</div></div>
        <div className="poll-i"><div className="l">PM10</div><div className="v">{w.pm10}</div></div>
        <div className="poll-i"><div className="l">NO&#8322;</div><div className="v">{w.no2}</div></div>
      </div>
    </div>
  );
}

/* ── Astronomy Card ── */
function AstroCard({ a }) {
  const tip = v => v >= 6 ? "Sharp, stable" : v >= 4 ? "Moderate" : "Turbulent";
  const ttip = v => v >= 6 ? "Very clear" : v >= 4 ? "Moderate" : "Hazy";
  return (
    <div className="card">
      <div className="card-t">Astronomy</div>
      <div className="a-grid">
        <div className="a-item"><div className="l">Seeing<span className="tt" title="Atmospheric turbulence">i</span></div><div className="v">{a.seeing_str} ({a.seeing}/8)</div><div className="d">{tip(a.seeing)}</div></div>
        <div className="a-item"><div className="l">Transparency<span className="tt" title="Atmospheric clarity">i</span></div><div className="v">{a.transparency_str} ({a.transparency}/8)</div><div className="d">{ttip(a.transparency)}</div></div>
        <div className="a-item"><div className="l">Stability<span className="tt" title="Lifted index">i</span></div><div className="v">{a.lifted_index}</div><div className="d">Lifted index</div></div>
        <div className="a-item"><div className="l">Wind 10m</div><div className="v">{a.wind10m} km/h</div><div className="d">At surface</div></div>
      </div>
    </div>
  );
}

/* ── Moon Card ── */
function MoonCard({ m }) {
  const ico = {"New Moon":"\u{1F311}","Waxing Crescent":"\u{1F312}","First Quarter":"\u{1F313}","Waxing Gibbous":"\u{1F314}","Full Moon":"\u{1F315}","Waning Gibbous":"\u{1F316}","Last Quarter":"\u{1F317}","Waning Crescent":"\u{1F318}"};
  return (
    <div className="card">
      <div className="card-t">Moon</div>
      <div className="moon-ico">{ico[m.moon_phase]||"\u{1F319}"}</div>
      <div className="moon-name">{m.moon_phase}</div>
      <div className="moon-ill">{m.moon_illumination}% illuminated</div>
      <div className="moon-g">
        <div className="moon-t"><div className="l">Sunrise</div><div className="v">{m.sunrise}</div></div>
        <div className="moon-t"><div className="l">Sunset</div><div className="v">{m.sunset}</div></div>
        <div className="moon-t"><div className="l">Moonrise</div><div className="v">{m.moonrise}</div></div>
        <div className="moon-t"><div className="l">Moonset</div><div className="v">{m.moonset}</div></div>
      </div>
    </div>
  );
}

/* ── Viewing Window Card ── */
function ViewingCard({ s }) {
  return (
    <div className="card">
      <div className="card-t">Best Viewing Window</div>
      <div className="vw-time">{s.viewing_window}</div>
      <div className="vw-note">Based on AQI & cloud forecast</div>
      <div className="card-t" style={{marginTop:".3rem"}}>Visible Tonight</div>
      <ul className="vw-list">
        {s.visible_objects.map((o,i)=><li key={i}>{o}</li>)}
      </ul>
    </div>
  );
}

/* ── Forecast Card (Recharts Area) ── */
function ForecastCard({ forecast, theme }) {
  const isDark = theme === "dark";
  const fmtDate = d => new Date(d).toLocaleDateString("en-IN",{weekday:"short",month:"short",day:"numeric"});
  const owm = c => ({"01d":"☀️","01n":"🌑","02d":"⛅","02n":"☁️","03d":"☁️","03n":"☁️","04d":"☁️","04n":"☁️","09d":"🌧️","09n":"🌧️","10d":"🌦️","10n":"🌧️","11d":"⛈️","11n":"⛈️","13d":"❄️","13n":"❄️","50d":"🌫️","50n":"🌫️"})[c]||"🌤️";

  const chartData = forecast.map(d => ({
    date: fmtDate(d.date), high: d.max_temp, low: d.min_temp, clouds: d.cloud_avg
  }));

  return (
    <div className="card span2">
      <div className="card-t">5-Day Forecast</div>
      <div className="fc-row">
        {forecast.map((d,i) => (
          <div key={i} className="fc-d">
            <div className="dt">{fmtDate(d.date)}</div>
            <div className="ic">{owm(d.icon)}</div>
            <div className="tm"><span className="hi">{d.max_temp}&deg;</span> / <span className="lo">{d.min_temp}&deg;</span></div>
            <div className="cl">{d.cloud_avg}%</div>
          </div>
        ))}
      </div>
      <div className="chart-area" style={{height:180}}>
        <ResponsiveContainer>
          <AreaChart data={chartData} margin={{top:8,right:8,bottom:0,left:-16}}>
            <defs>
              <linearGradient id="gHi" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#6d8cff" stopOpacity={0.25}/>
                <stop offset="100%" stopColor="#6d8cff" stopOpacity={0}/>
              </linearGradient>
              <linearGradient id="gLo" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#a78bfa" stopOpacity={0.15}/>
                <stop offset="100%" stopColor="#a78bfa" stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="date" tick={{fontSize:10}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={{background:isDark?"#0a0a0b":"#fff",border:"1px solid "+(isDark?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)"),borderRadius:8,fontSize:12}}/>
            <Area type="monotone" dataKey="high" stroke="#6d8cff" strokeWidth={2} fill="url(#gHi)" dot={{r:3,fill:"#6d8cff"}} name="High °C"/>
            <Area type="monotone" dataKey="low" stroke="#a78bfa" strokeWidth={2} fill="url(#gLo)" dot={{r:3,fill:"#a78bfa"}} name="Low °C"/>
            <Area type="monotone" dataKey="clouds" stroke="#fbbf24" strokeWidth={1.5} strokeDasharray="4 3" fill="none" dot={{r:2,fill:"#fbbf24"}} name="Cloud %"/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

/* ── Auth Modal ── */
function AuthModal({ onClose, onLogin }) {
  const [tab, setTab] = useState("login");
  const [msg, setMsg] = useState({ text: "", ok: false });

  const doLogin = async () => {
    const u = document.getElementById("l-user").value;
    const p = document.getElementById("l-pass").value;
    const r = await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
    const d = await r.json();
    if (r.ok) { onLogin(d.username); onClose(); }
    else setMsg({ text: d.error, ok: false });
  };

  const doReg = async () => {
    const u = document.getElementById("r-user").value;
    const e = document.getElementById("r-email").value;
    const p = document.getElementById("r-pass").value;
    const r = await fetch("/api/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,email:e,password:p})});
    const d = await r.json();
    if (r.ok) { setMsg({ text: "Registered! Sign in now.", ok: true }); setTab("login"); }
    else setMsg({ text: d.error, ok: false });
  };

  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal">
        <div className="m-tabs">
          <button className={"m-tab"+(tab==="login"?" on":"")} onClick={()=>{setTab("login");setMsg({text:"",ok:false})}}>Sign In</button>
          <button className={"m-tab"+(tab==="register"?" on":"")} onClick={()=>{setTab("register");setMsg({text:"",ok:false})}}>Register</button>
        </div>
        {tab==="login" && <>
          <div className="fg"><label>Username</label><input id="l-user" type="text" placeholder="your username"/></div>
          <div className="fg"><label>Password</label><input id="l-pass" type="password" placeholder="password" onKeyDown={e=>{if(e.key==="Enter")doLogin()}}/></div>
          <div className="m-act"><button className="btn btn-f" style={{flex:1}} onClick={doLogin}>Sign In</button><button className="btn btn-o" onClick={onClose}>Cancel</button></div>
        </>}
        {tab==="register" && <>
          <div className="fg"><label>Username</label><input id="r-user" type="text" placeholder="choose a username"/></div>
          <div className="fg"><label>Email</label><input id="r-email" type="email" placeholder="you@example.com"/></div>
          <div className="fg"><label>Password</label><input id="r-pass" type="password" placeholder="password"/></div>
          <div className="m-act"><button className="btn btn-f" style={{flex:1}} onClick={doReg}>Register</button><button className="btn btn-o" onClick={onClose}>Cancel</button></div>
        </>}
        {msg.text && <div className={"m-msg "+(msg.ok?"ok":"er")}>{msg.text}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
